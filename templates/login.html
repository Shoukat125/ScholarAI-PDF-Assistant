<!DOCTYPE html>
<html lang="en"><script>
(function(){var t=localStorage.getItem('scholarai_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScholarAI — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0e0c;
            --surface: #1a1916;
            --border: #2e2c28;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --text: #f0ece4;
            --text-muted: #8a8578;
            --surface2: #1e1c18;
            --error: #e05c5c;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Floating Lines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 60px,
                    rgba(201,168,76,0.03) 60px,
                    rgba(201,168,76,0.03) 61px
                );
            pointer-events: none;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 24px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(201,168,76,0.3);
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* Card */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        /* Error */
        .error-box {
            background: rgba(224,92,92,0.1);
            border: 1px solid rgba(224,92,92,0.3);
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 13px;
            color: var(--error);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap span {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
        }

        input[type="password"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 14px 14px 44px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="password"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }

        input[type="password"]::placeholder {
            color: var(--text-muted);
        }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: var(--radius);
            color: #0f0e0c;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.3px;
            margin-top: 8px;
        }

        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(201,168,76,0.35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .divider hr {
            flex: 1;
            border: none;
            border-top: 1px solid var(--border);
        }

        .divider span {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        [data-theme="light"] {
            --bg: #f5f2eb;
            --surface: #ffffff;
            --surface2: #ede9e0;
            --border: #d8d2c4;
            --gold: #a0722a;
            --gold-light: #c9942e;
            --text: #1e1c18;
            --text-muted: #6b6457;
            --success: #2d7a2d;
            --error: #c0392b;
        }

        .theme-toggle {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .theme-toggle:hover { border-color: var(--gold); color: var(--text); }
    </style>
</head>
<body>

<div class="login-wrapper">
    <!-- Logo -->
    <div class="logo">
        <div class="logo-icon">📚</div>
        <h1>ScholarAI</h1>
        <p>Your Personal Reading Intelligence</p>
    </div>

    <!-- Card -->
    <div class="login-card">
        <h2 class="card-title">Welcome Back</h2>
        <p class="card-subtitle">Enter your password to continue</p>

        <!-- Error Message -->
        {% if error %}
        <div class="error-box">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" action="/login">
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <span>🔑</span>
                    <input
                        type="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                        autofocus
                    >
                </div>
            </div>

            <button type="submit" class="btn-login">
                Sign In →
            </button>
        </form>

        <div class="divider">
            <hr><span>ScholarAI</span><hr>
        </div>

        <div style="text-align:center; font-size:12px; color:var(--text-muted);">
            📖 Read Smart. Learn Faster. Retain More.
        </div>
    </div>

    <div class="login-footer" style="display:flex; align-items:center; justify-content:center; gap:12px;">
        <span>ScholarAI © 2024 — All rights reserved</span>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">☀️</button>
    </div>
</div>



<script>
    function toggleTheme() {
        const cur = document.documentElement.getAttribute('data-theme');
        const nxt = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', nxt);
        localStorage.setItem('scholarai_theme', nxt);
        const btn = document.getElementById('themeBtn');
        if (btn) btn.textContent = nxt === 'dark' ? '☀️' : '🌙';
    }

    document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('themeBtn');
        if (btn) {
            const t = localStorage.getItem('scholarai_theme') || 'dark';
            btn.textContent = t === 'dark' ? '☀️' : '🌙';
        }
    });
</script>

</body>
</html>
